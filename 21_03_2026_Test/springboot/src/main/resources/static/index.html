<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c6dfa;
      --accent2: #f06292;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #4ade80;
      --error: #f87171;
      --input-bg: #16161f;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-blob:nth-child(1) { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .bg-blob:nth-child(2) { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
    .bg-blob:nth-child(3) { width: 300px; height: 300px; background: #38bdf8; top: 50%; left: 50%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -30px) scale(1.08); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 0 0 1px rgba(124,109,250,0.08), 0 40px 80px rgba(0,0,0,0.6);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 0 0 4px 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      font-weight: 300;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
      transition: color 0.2s;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); font-weight: 300; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,109,250,0.12);
    }

    input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--accent); }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      padding: 2px;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #9c6dfa);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,109,250,0.3);
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover:not(:disabled)::after { opacity: 1; }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(124,109,250,0.4); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn .btn-text { position: relative; z-index: 1; }

    /* Spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: relative; z-index: 1;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }

    /* Alert messages */
    .alert {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 400;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .alert.error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--error);
    }
    .alert.success {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      color: var(--success);
    }
    .alert.show { display: flex; align-items: flex-start; gap: 10px; }

    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .divider {
      margin: 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-link {
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }

    .login-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .login-link a:hover { color: #a89dff; }

    /* Input validation states */
    input.invalid { border-color: var(--error) !important; box-shadow: 0 0 0 3px rgba(248,113,113,0.1) !important; }
    input.valid   { border-color: rgba(74,222,128,0.4) !important; }

    .field-error {
      display: none;
      font-size: 11.5px;
      color: var(--error);
      margin-top: 5px;
      padding-left: 4px;
    }
    .field-error.show { display: block; animation: fadeIn 0.2s ease; }

    /* Password strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-seg {
      flex: 1; height: 3px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s;
    }
    .strength-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-name">SpringApp</span>
    </div>

    <h1>Create your account</h1>
    <p class="subtitle">Join us — it only takes a moment.</p>

    <div class="field">
      <label for="name">Full Name</label>
      <div class="input-wrap">
        <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
        <span class="input-icon">👤</span>
      </div>
      <div class="field-error" id="nameErr">Please enter your full name.</div>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        <span class="input-icon">✉</span>
      </div>
      <div class="field-error" id="emailErr">Please enter a valid email address.</div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
        <span class="input-icon">🔒</span>
        <button class="toggle-pw" type="button" id="togglePw" aria-label="Toggle password visibility">👁</button>
      </div>
      <div class="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
      <div class="field-error" id="passErr">Password must be at least 8 characters.</div>
    </div>

    <button class="btn" id="submitBtn" onclick="handleRegister()">
      <span class="btn-text">Create Account →</span>
      <div class="spinner"></div>
    </button>

    <div class="alert" id="alertBox">
      <span class="alert-icon" id="alertIcon"></span>
      <span id="alertMsg"></span>
    </div>

    <div class="divider">or</div>

    <div class="login-link">Already have an account? <a href="#">Sign in</a></div>
  </div>

  <script>
    // ── Toggle password visibility ──────────────────────────
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      if (pw.type === 'password') { pw.type = 'text'; btn.textContent = '🙈'; }
      else { pw.type = 'password'; btn.textContent = '👁'; }
    });

    // ── Password strength ───────────────────────────────────
    document.getElementById('password').addEventListener('input', function() {
      const v = this.value;
      const segs = [document.getElementById('s1'), document.getElementById('s2'),
                    document.getElementById('s3'), document.getElementById('s4')];
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const colors = ['', '#f87171', '#fbbf24', '#34d399', '#4ade80'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      segs.forEach((s, i) => { s.style.background = i < score ? colors[score] : 'var(--border)'; });
      label.textContent = v.length > 0 ? labels[score] : '';
      label.style.color = colors[score];
    });

    // ── Live validation ─────────────────────────────────────
    function validateField(id, errId, check) {
      const input = document.getElementById(id);
      const err   = document.getElementById(errId);
      const valid = check(input.value.trim());
      input.classList.toggle('invalid', !valid && input.value.length > 0);
      input.classList.toggle('valid',   valid);
      err.classList.toggle('show', !valid && input.value.length > 0);
      return valid;
    }

    document.getElementById('name').addEventListener('blur', () =>
      validateField('name', 'nameErr', v => v.length >= 2));
    document.getElementById('email').addEventListener('blur', () =>
      validateField('email', 'emailErr', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)));
    document.getElementById('password').addEventListener('blur', () =>
      validateField('password', 'passErr', v => v.length >= 8));

    // ── Show alert ──────────────────────────────────────────
    function showAlert(type, msg) {
      const box = document.getElementById('alertBox');
      const icon = document.getElementById('alertIcon');
      const text = document.getElementById('alertMsg');
      box.className = `alert ${type} show`;
      icon.textContent = type === 'success' ? '✅' : '⚠️';
      text.textContent = msg;
    }

    // ── Register ────────────────────────────────────────────
    async function handleRegister() {
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value.trim();

      // Front-end validation
      let valid = true;
      if (name.length < 2)                               { validateField('name', 'nameErr', v => v.length >= 2);  valid = false; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))    { validateField('email', 'emailErr', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)); valid = false; }
      if (pass.length < 8)                               { validateField('password', 'passErr', v => v.length >= 8); valid = false; }
      if (!valid) { showAlert('error', 'Please fix the highlighted fields before submitting.'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.classList.add('loading');

      try {
        /**
         * ── API CALL ──────────────────────────────────────────────
         * Adjust the URL to match your Spring Boot server.
         * Default: http://localhost:8080/api/users/register
         *
         * Expected request body (UserDto):
         * { "name": "...", "email": "...", "password": "..." }
         *
         * Success  → 200/201 with user object
         * Duplicate→ 409 / custom DuplicateEntryException response
         * ─────────────────────────────────────────────────────────
         */
        const response = await fetch('http://localhost:8082/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password: pass })
        });

        const data = await response.json().catch(() => null);

        if (response.ok) {
          showAlert('success', `🎉 Account created successfully! Welcome, ${name}.`);
          document.getElementById('name').value = '';
          document.getElementById('email').value = '';
          document.getElementById('password').value = '';
          ['name','email','password'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('valid','invalid');
          });
          ['s1','s2','s3','s4'].forEach(id =>
            document.getElementById(id).style.background = 'var(--border)');
          document.getElementById('strengthLabel').textContent = '';
        } else {
          // Handle your DuplicateEntryException or GlobalException response
          const msg = data?.message || data?.error || `Registration failed (${response.status}).`;
          showAlert('error', "Mail already present in the database");
        }
      } catch (err) {
        showAlert('error', 'Could not connect to the server. Make sure your backend is running on port 8082.');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>
</body>
</html>
